<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能助手</title>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      --color-primary:              #1E40AF;
      --color-primary-container:    #DBEAFE;
      --color-on-primary:           #ffffff;
      --color-background:           #FAFCFF;
      --color-surface-container-lowest:   #FFFFFF;
      --color-surface:                    #FFFFFF;
      --color-surface-container:          #F1F5F9;
      --color-surface-container-high:     #E2E8F0;
      --color-surface-container-highest:  #CBD5E1;
      --color-on-surface:           #1E293B;
      --color-on-surface-variant:   #64748B;
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      --color-outline:          #CBD5E1;
      --color-outline-variant:  #E2E8F0;
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      --shadow-card:   0 4px 12px rgba(0,0,0,0.08);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.12);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.15);
      --font-sans: "Noto Sans SC", system-ui, sans-serif;
    }
  </style>

  <style>
    body {
      min-height: max(812px, 100dvh);
      font-family: "Noto Sans SC", system-ui, sans-serif;
    }
  </style>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- 顶部 Header -->
  <header class="bg-background sticky top-0 z-40 h-14 flex items-center justify-center px-4">
    <h1 class="text-base font-semibold text-on-surface">智能助手</h1>
  </header>

  <!-- TabBar -->
  <nav class="fixed bottom-0 left-0 right-0 z-40 bg-surface
              flex justify-around items-center h-14 pb-[env(safe-area-inset-bottom)]
              border-t border-outline-variant/20">
    <a href="home.html" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-primary" aria-current="page">
      <i data-lucide="message-circle" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium">助手</span>
    </a>
    <a href="history.html" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-on-surface-variant transition-colors">
      <i data-lucide="clock" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium">历史</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-on-surface-variant transition-colors">
      <i data-lucide="user" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium">我的</span>
    </a>
  </nav>

  <main class="flex-1 overflow-y-auto pb-[calc(3.5rem+env(safe-area-inset-bottom))]">
    <!-- @main-content:start -->

    <!-- 欢迎区域 -->
    <div class="px-4 pt-6 pb-4">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center">
          <i data-lucide="bot" class="w-6 h-6 text-primary"></i>
        </div>
        <div>
          <h2 class="text-lg font-semibold text-on-surface">您好，小初</h2>
          <p class="text-sm text-on-surface-variant">有什么可以帮您的？</p>
        </div>
      </div>
    </div>

    <!-- 快捷入口 -->
    <div class="px-4 mb-6">
      <h3 class="text-xs font-medium text-on-surface-variant mb-3 uppercase tracking-wide">快捷入口</h3>
      <div class="grid grid-cols-4 gap-3">
        <a href="chat.html" class="flex flex-col items-center gap-2 p-3 bg-surface rounded-xl shadow-card hover:bg-surface-container transition-colors">
          <div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center">
            <i data-lucide="file-text" class="w-5 h-5 text-primary"></i>
          </div>
          <span class="text-xs font-medium text-on-surface">文档助手</span>
        </a>
        <a href="chat.html" class="flex flex-col items-center gap-2 p-3 bg-surface rounded-xl shadow-card hover:bg-surface-container transition-colors">
          <div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center">
            <i data-lucide="calendar" class="w-5 h-5 text-primary"></i>
          </div>
          <span class="text-xs font-medium text-on-surface">日程安排</span>
        </a>
        <a href="chat.html" class="flex flex-col items-center gap-2 p-3 bg-surface rounded-xl shadow-card hover:bg-surface-container transition-colors">
          <div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center">
            <i data-lucide="mail" class="w-5 h-5 text-primary"></i>
          </div>
          <span class="text-xs font-medium text-on-surface">邮件处理</span>
        </a>
        <a href="chat.html" class="flex flex-col items-center gap-2 p-3 bg-surface rounded-xl shadow-card hover:bg-surface-container transition-colors">
          <div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center">
            <i data-lucide="search" class="w-5 h-5 text-primary"></i>
          </div>
          <span class="text-xs font-medium text-on-surface">知识检索</span>
        </a>
      </div>
    </div>

    <!-- 最近对话 -->
    <div class="px-4 mb-6">
      <h3 class="text-xs font-medium text-on-surface-variant mb-3 uppercase tracking-wide">最近对话</h3>
      <div class="space-y-3">
        <a href="chat.html" class="block p-4 bg-surface rounded-xl shadow-card hover:bg-surface-container transition-colors">
          <div class="flex items-start gap-3">
            <div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center flex-shrink-0">
              <i data-lucide="message-square" class="w-5 h-5 text-primary"></i>
            </div>
            <div class="flex-1 min-w-0">
              <h4 class="text-sm font-medium text-on-surface truncate">项目进度汇报</h4>
              <p class="text-xs text-on-surface-variant mt-1 line-clamp-2">帮我整理一下本周项目的完成情况和下周计划...</p>
            </div>
          </div>
          <div class="flex items-center justify-between mt-3 text-xs text-on-surface-variant">
            <span>今天 14:30</span>
            <div class="flex items-center gap-1">
              <i data-lucide="corner-up-right" class="w-3 h-3"></i>
              <span>继续对话</span>
            </div>
          </div>
        </a>

        <a href="chat.html" class="block p-4 bg-surface rounded-xl shadow-card hover:bg-surface-container transition-colors">
          <div class="flex items-start gap-3">
            <div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center flex-shrink-0">
              <i data-lucide="code" class="w-5 h-5 text-primary"></i>
            </div>
            <div class="flex-1 min-w-0">
              <h4 class="text-sm font-medium text-on-surface truncate">代码问题排查</h4>
              <p class="text-xs text-on-surface-variant mt-1 line-clamp-2">这段 Python 代码为什么运行报错？请帮我分析原因...</p>
            </div>
          </div>
          <div class="flex items-center justify-between mt-3 text-xs text-on-surface-variant">
            <span>昨天 16:45</span>
            <div class="flex items-center gap-1">
              <i data-lucide="corner-up-right" class="w-3 h-3"></i>
              <span>继续对话</span>
            </div>
          </div>
        </a>
      </div>
    </div>

    <!-- 新建对话按钮 -->
    <div class="px-4 pb-6">
      <a href="chat.html" class="flex items-center justify-center gap-2 w-full py-3 bg-primary text-on-primary rounded-xl font-medium hover:bg-primary/90 transition-colors">
        <i data-lucide="plus" class="w-5 h-5"></i>
        <span>新建对话</span>
      </a>
    </div>

    <!-- @main-content:end -->
  </main>

  <script>lucide.createIcons();</script>
</body>

</html>
