<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>对话历史</title>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      --color-primary:              #1E40AF;
      --color-primary-container:    #DBEAFE;
      --color-on-primary:           #ffffff;
      --color-background:           #FAFCFF;
      --color-surface-container-lowest:   #FFFFFF;
      --color-surface:                    #FFFFFF;
      --color-surface-container:          #F1F5F9;
      --color-surface-container-high:     #E2E8F0;
      --color-surface-container-highest:  #CBD5E1;
      --color-on-surface:           #1E293B;
      --color-on-surface-variant:   #64748B;
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      --color-outline:          #CBD5E1;
      --color-outline-variant:  #E2E8F0;
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      --shadow-card:   0 4px 12px rgba(0,0,0,0.08);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.12);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.15);
      --font-sans: "Noto Sans SC", system-ui, sans-serif;
    }
  </style>

  <style>
    body {
      min-height: max(812px, 100dvh);
      font-family: "Noto Sans SC", system-ui, sans-serif;
    }
  </style>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- 顶部 Header -->
  <header class="bg-background sticky top-0 z-40 h-14 flex items-center justify-center px-4">
    <h1 class="text-base font-semibold text-on-surface">对话历史</h1>
  </header>

  <!-- TabBar -->
  <nav class="fixed bottom-0 left-0 right-0 z-40 bg-surface
              flex justify-around items-center h-14 pb-[env(safe-area-inset-bottom)]
              border-t border-outline-variant/20">
    <a href="home.html" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-on-surface-variant transition-colors" aria-current="page">
      <i data-lucide="message-circle" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium">助手</span>
    </a>
    <a href="history.html" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-primary" aria-current="page">
      <i data-lucide="clock" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium">历史</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-on-surface-variant transition-colors">
      <i data-lucide="user" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium">我的</span>
    </a>
  </nav>

  <main class="flex-1 overflow-y-auto pb-[calc(3.5rem+env(safe-area-inset-bottom))]">
    <!-- @main-content:start -->

    <!-- 日期分组 -->
    <div class="px-4 py-3">
      <span class="text-xs font-medium text-on-surface-variant">今天</span>
    </div>

    <!-- 对话列表 -->
    <div class="px-4 space-y-3">
      <a href="chat.html" class="block p-4 bg-surface rounded-xl shadow-card">
        <div class="flex items-start justify-between">
          <div class="flex items-center gap-3 flex-1">
            <div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center flex-shrink-0">
              <i data-lucide="file-text" class="w-5 h-5 text-primary"></i>
            </div>
            <div class="flex-1 min-w-0">
              <h4 class="text-sm font-medium text-on-surface">项目进度汇报</h4>
              <p class="text-xs text-on-surface-variant mt-1 line-clamp-1">帮我整理一下本周项目的完成情况和下周计划...</p>
            </div>
          </div>
          <span class="text-xs text-on-surface-variant ml-2">14:30</span>
        </div>
        <div class="flex items-center gap-4 mt-3 pt-3 border-t border-outline-variant/20">
          <span class="text-xs text-on-surface-variant flex items-center gap-1">
            <i data-lucide="message-circle" class="w-3 h-3"></i>
            12 条消息
          </span>
          <span class="text-xs text-primary">继续对话</span>
        </div>
      </a>

      <a href="chat.html" class="block p-4 bg-surface rounded-xl shadow-card">
        <div class="flex items-start justify-between">
          <div class="flex items-center gap-3 flex-1">
            <div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center flex-shrink-0">
              <i data-lucide="help-circle" class="w-5 h-5 text-primary"></i>
            </div>
            <div class="flex-1 min-w-0">
              <h4 class="text-sm font-medium text-on-surface">人事政策咨询</h4>
              <p class="text-xs text-on-surface-variant mt-1 line-clamp-1">请问年假是怎么计算的？</p>
            </div>
          </div>
          <span class="text-xs text-on-surface-variant ml-2">11:20</span>
        </div>
        <div class="flex items-center gap-4 mt-3 pt-3 border-t border-outline-variant/20">
          <span class="text-xs text-on-surface-variant flex items-center gap-1">
            <i data-lucide="message-circle" class="w-3 h-3"></i>
            5 条消息
          </span>
          <span class="text-xs text-primary">继续对话</span>
        </div>
      </a>
    </div>

    <!-- 日期分组 -->
    <div class="px-4 py-3 mt-4">
      <span class="text-xs font-medium text-on-surface-variant">昨天</span>
    </div>

    <div class="px-4 space-y-3">
      <a href="chat.html" class="block p-4 bg-surface rounded-xl shadow-card">
        <div class="flex items-start justify-between">
          <div class="flex items-center gap-3 flex-1">
            <div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center flex-shrink-0">
              <i data-lucide="code" class="w-5 h-5 text-primary"></i>
            </div>
            <div class="flex-1 min-w-0">
              <h4 class="text-sm font-medium text-on-surface">代码问题排查</h4>
              <p class="text-xs text-on-surface-variant mt-1 line-clamp-1">这段 Python 代码为什么运行报错？请帮我分析原因...</p>
            </div>
          </div>
          <span class="text-xs text-on-surface-variant ml-2">16:45</span>
        </div>
        <div class="flex items-center gap-4 mt-3 pt-3 border-t border-outline-variant/20">
          <span class="text-xs text-on-surface-variant flex items-center gap-1">
            <i data-lucide="message-circle" class="w-3 h-3"></i>
            8 条消息
          </span>
          <span class="text-xs text-primary">继续对话</span>
        </div>
      </a>

      <a href="chat.html" class="block p-4 bg-surface rounded-xl shadow-card">
        <div class="flex items-start justify-between">
          <div class="flex items-center gap-3 flex-1">
            <div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center flex-shrink-0">
              <i data-lucide="bar-chart-3" class="w-5 h-5 text-primary"></i>
            </div>
            <div class="flex-1 min-w-0">
              <h4 class="text-sm font-medium text-on-surface">数据分析需求</h4>
              <p class="text-xs text-on-surface-variant mt-1 line-clamp-1">帮我生成上个月的销售数据报表...</p>
            </div>
          </div>
          <span class="text-xs text-on-surface-variant ml-2">10:30</span>
        </div>
        <div class="flex items-center gap-4 mt-3 pt-3 border-t border-outline-variant/20">
          <span class="text-xs text-on-surface-variant flex items-center gap-1">
            <i data-lucide="message-circle" class="w-3 h-3"></i>
            15 条消息
          </span>
          <span class="text-xs text-primary">继续对话</span>
        </div>
      </a>
    </div>

    <!-- 日期分组 -->
    <div class="px-4 py-3 mt-4">
      <span class="text-xs font-medium text-on-surface-variant">更早</span>
    </div>

    <div class="px-4 space-y-3 pb-4">
      <a href="chat.html" class="block p-4 bg-surface rounded-xl shadow-card">
        <div class="flex items-start justify-between">
          <div class="flex items-center gap-3 flex-1">
            <div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center flex-shrink-0">
              <i data-lucide="clipboard-list" class="w-5 h-5 text-primary"></i>
            </div>
            <div class="flex-1 min-w-0">
              <h4 class="text-sm font-medium text-on-surface">会议纪要整理</h4>
              <p class="text-xs text-on-surface-variant mt-1 line-clamp-1">请帮我整理上周五的会议要点...</p>
            </div>
          </div>
          <span class="text-xs text-on-surface-variant ml-2">3天前</span>
        </div>
      </a>

      <a href="chat.html" class="block p-4 bg-surface rounded-xl shadow-card">
        <div class="flex items-start justify-between">
          <div class="flex items-center gap-3 flex-1">
            <div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center flex-shrink-0">
              <i data-lucide="lightbulb" class="w-5 h-5 text-primary"></i>
            </div>
            <div class="flex-1 min-w-0">
              <h4 class="text-sm font-medium text-on-surface">创意方案头脑风暴</h4>
              <p class="text-xs text-on-surface-variant mt-1 line-clamp-1">帮我头脑风暴一下新产品的营销方案...</p>
            </div>
          </div>
          <span class="text-xs text-on-surface-variant ml-2">上周</span>
        </div>
      </a>
    </div>

    <!-- @main-content:end -->
  </main>

  <script>lucide.createIcons();</script>
</body>

</html>
