<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的</title>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      --color-primary:              #1E40AF;
      --color-primary-container:    #DBEAFE;
      --color-on-primary:           #ffffff;
      --color-background:           #FAFCFF;
      --color-surface-container-lowest:   #FFFFFF;
      --color-surface:                    #FFFFFF;
      --color-surface-container:          #F1F5F9;
      --color-surface-container-high:     #E2E8F0;
      --color-surface-container-highest:  #CBD5E1;
      --color-on-surface:           #1E293B;
      --color-on-surface-variant:   #64748B;
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      --color-outline:          #CBD5E1;
      --color-outline-variant:  #E2E8F0;
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      --shadow-card:   0 4px 12px rgba(0,0,0,0.08);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.12);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.15);
      --font-sans: "Noto Sans SC", system-ui, sans-serif;
    }
  </style>

  <style>
    body {
      min-height: max(812px, 100dvh);
      font-family: "Noto Sans SC", system-ui, sans-serif;
    }
  </style>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- 顶部 Header -->
  <header class="bg-background sticky top-0 z-40 h-14 flex items-center justify-center px-4">
    <h1 class="text-base font-semibold text-on-surface">我的</h1>
  </header>

  <!-- TabBar -->
  <nav class="fixed bottom-0 left-0 right-0 z-40 bg-surface
              flex justify-around items-center h-14 pb-[env(safe-area-inset-bottom)]
              border-t border-outline-variant/20">
    <a href="home.html" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-on-surface-variant transition-colors" aria-current="page">
      <i data-lucide="message-circle" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium">助手</span>
    </a>
    <a href="history.html" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-on-surface-variant transition-colors">
      <i data-lucide="clock" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium">历史</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-primary" aria-current="page">
      <i data-lucide="user" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium">我的</span>
    </a>
  </nav>

  <main class="flex-1 overflow-y-auto pb-[calc(3.5rem+env(safe-area-inset-bottom))]">
    <!-- @main-content:start -->

    <!-- 用户信息卡片 -->
    <div class="px-4 py-6">
      <div class="flex items-center gap-4 p-4 bg-surface rounded-2xl shadow-card">
        <div class="w-16 h-16 rounded-full bg-primary flex items-center justify-center">
          <span class="text-2xl font-semibold text-on-primary">初</span>
        </div>
        <div class="flex-1">
          <h2 class="text-lg font-semibold text-on-surface">小初</h2>
          <p class="text-sm text-on-surface-variant">产品研发部 · 产品经理</p>
        </div>
        <i data-lucide="chevron-right" class="w-5 h-5 text-on-surface-variant"></i>
      </div>
    </div>

    <!-- 统计信息 -->
    <div class="px-4 mb-6">
      <div class="grid grid-cols-3 gap-3">
        <div class="p-4 bg-surface rounded-xl text-center shadow-card">
          <div class="text-2xl font-bold text-primary">86</div>
          <div class="text-xs text-on-surface-variant mt-1">对话次数</div>
        </div>
        <div class="p-4 bg-surface rounded-xl text-center shadow-card">
          <div class="text-2xl font-bold text-primary">12</div>
          <div class="text-xs text-on-surface-variant mt-1">收藏内容</div>
        </div>
        <div class="p-4 bg-surface rounded-xl text-center shadow-card">
          <div class="text-2xl font-bold text-primary">5</div>
          <div class="text-xs text-on-surface-variant mt-1">使用天数</div>
        </div>
      </div>
    </div>

    <!-- 功能列表 -->
    <div class="px-4 space-y-3">
      <a href="#" class="flex items-center gap-4 p-4 bg-surface rounded-xl shadow-card hover:bg-surface-container transition-colors">
        <div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center">
          <i data-lucide="star" class="w-5 h-5 text-primary"></i>
        </div>
        <div class="flex-1">
          <h3 class="text-sm font-medium text-on-surface">我的收藏</h3>
          <p class="text-xs text-on-surface-variant">查看收藏的内容</p>
        </div>
        <i data-lucide="chevron-right" class="w-4 h-4 text-on-surface-variant"></i>
      </a>

      <a href="#" class="flex items-center gap-4 p-4 bg-surface rounded-xl shadow-card hover:bg-surface-container transition-colors">
        <div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center">
          <i data-lucide="settings" class="w-5 h-5 text-primary"></i>
        </div>
        <div class="flex-1">
          <h3 class="text-sm font-medium text-on-surface">设置</h3>
          <p class="text-xs text-on-surface-variant">个性化配置</p>
        </div>
        <i data-lucide="chevron-right" class="w-4 h-4 text-on-surface-variant"></i>
      </a>

      <a href="#" class="flex items-center gap-4 p-4 bg-surface rounded-xl shadow-card hover:bg-surface-container transition-colors">
        <div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center">
          <i data-lucide="help-circle" class="w-5 h-5 text-primary"></i>
        </div>
        <div class="flex-1">
          <h3 class="text-sm font-medium text-on-surface">帮助与反馈</h3>
          <p class="text-xs text-on-surface-variant">常见问题与建议</p>
        </div>
        <i data-lucide="chevron-right" class="w-4 h-4 text-on-surface-variant"></i>
      </a>

      <a href="#" class="flex items-center gap-4 p-4 bg-surface rounded-xl shadow-card hover:bg-surface-container transition-colors">
        <div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center">
          <i data-lucide="info" class="w-5 h-5 text-primary"></i>
        </div>
        <div class="flex-1">
          <h3 class="text-sm font-medium text-on-surface">关于</h3>
          <p class="text-xs text-on-surface-variant">版本 1.0.0</p>
        </div>
        <i data-lucide="chevron-right" class="w-4 h-4 text-on-surface-variant"></i>
      </a>
    </div>

    <!-- @main-content:end -->
  </main>

  <script>lucide.createIcons();</script>
</body>

</html>
