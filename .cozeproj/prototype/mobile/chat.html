<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>对话详情</title>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      --color-primary:              #1E40AF;
      --color-primary-container:    #DBEAFE;
      --color-on-primary:           #ffffff;
      --color-background:           #FAFCFF;
      --color-surface-container-lowest:   #FFFFFF;
      --color-surface:                    #FFFFFF;
      --color-surface-container:          #F1F5F9;
      --color-surface-container-high:     #E2E8F0;
      --color-surface-container-highest:  #CBD5E1;
      --color-on-surface:           #1E293B;
      --color-on-surface-variant:   #64748B;
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      --color-outline:          #CBD5E1;
      --color-outline-variant:  #E2E8F0;
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      --shadow-card:   0 4px 12px rgba(0,0,0,0.08);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.12);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.15);
      --font-sans: "Noto Sans SC", system-ui, sans-serif;
    }
  </style>

  <style>
    body {
      min-height: max(812px, 100dvh);
      font-family: "Noto Sans SC", system-ui, sans-serif;
    }
  </style>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- 顶部 Header（二级页有返回按钮） -->
  <header class="bg-background sticky top-0 z-40 h-14 flex items-center justify-between px-4">
    <a href="home.html" class="w-10 h-10 flex items-center justify-center text-on-surface-variant rounded-full hover:bg-surface-container transition-colors">
      <i data-lucide="arrow-left" class="w-5 h-5"></i>
    </a>
    <h1 class="text-base font-semibold text-on-surface truncate max-w-[200px]">项目进度汇报</h1>
    <button class="w-10 h-10 flex items-center justify-center text-on-surface-variant rounded-full hover:bg-surface-container transition-colors">
      <i data-lucide="more-horizontal" class="w-5 h-5"></i>
    </button>
  </header>

  <main class="flex-1 overflow-y-auto pb-[calc(1rem+env(safe-area-inset-bottom))]">
    <!-- @main-content:start -->

    <!-- 消息列表 -->
    <div class="px-4 py-4 space-y-4">

      <!-- 用户消息 -->
      <div class="flex gap-3 justify-end">
        <div class="max-w-[80%]">
          <div class="bg-primary text-on-primary px-4 py-3 rounded-2xl rounded-tr-sm">
            <p class="text-sm">帮我整理一下本周项目的完成情况和下周计划</p>
          </div>
          <p class="text-xs text-on-surface-variant mt-1 text-right">14:30</p>
        </div>
      </div>

      <!-- AI 消息 -->
      <div class="flex gap-3 justify-start">
        <div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center flex-shrink-0 mt-2">
          <i data-lucide="bot" class="w-4 h-4 text-primary"></i>
        </div>
        <div class="max-w-[80%]">
          <div class="bg-surface px-4 py-3 rounded-2xl rounded-tl-sm shadow-card">
            <p class="text-sm text-on-surface">好的，我来帮您整理本周项目进度和下周计划。</p>
          </div>
          <div class="bg-surface px-4 py-3 rounded-2xl rounded-tl-sm shadow-card mt-2">
            <p class="text-sm text-on-surface mb-3"><strong>本周完成情况：</strong></p>
            <div class="space-y-2 text-sm text-on-surface">
              <div class="flex items-start gap-2">
                <i data-lucide="check-circle" class="w-4 h-4 text-success mt-0.5 flex-shrink-0"></i>
                <span>需求文档评审已完成</span>
              </div>
              <div class="flex items-start gap-2">
                <i data-lucide="check-circle" class="w-4 h-4 text-success mt-0.5 flex-shrink-0"></i>
                <span>UI 设计稿 V2.0 已交付</span>
              </div>
              <div class="flex items-start gap-2">
                <i data-lucide="check-circle" class="w-4 h-4 text-success mt-0.5 flex-shrink-0"></i>
                <span>后端接口开发完成 80%</span>
              </div>
            </div>
          </div>
          <p class="text-xs text-on-surface-variant mt-1">14:31</p>
        </div>
      </div>

      <!-- AI 消息继续 -->
      <div class="flex gap-3 justify-start">
        <div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center flex-shrink-0 mt-2">
          <i data-lucide="bot" class="w-4 h-4 text-primary"></i>
        </div>
        <div class="max-w-[80%]">
          <div class="bg-surface px-4 py-3 rounded-2xl rounded-tl-sm shadow-card">
            <p class="text-sm text-on-surface mb-3"><strong>下周计划：</strong></p>
            <div class="space-y-2 text-sm text-on-surface">
              <div class="flex items-start gap-2">
                <i data-lucide="circle" class="w-4 h-4 text-on-surface-variant mt-0.5 flex-shrink-0"></i>
                <span>完成剩余 20% 后端接口</span>
              </div>
              <div class="flex items-start gap-2">
                <i data-lucide="circle" class="w-4 h-4 text-on-surface-variant mt-0.5 flex-shrink-0"></i>
                <span>启动前端页面开发</span>
              </div>
              <div class="flex items-start gap-2">
                <i data-lucide="circle" class="w-4 h-4 text-on-surface-variant mt-0.5 flex-shrink-0"></i>
                <span>第一轮联调测试</span>
              </div>
            </div>
          </div>
          <div class="flex items-center gap-2 mt-2">
            <button class="flex items-center gap-1 px-3 py-1.5 text-xs text-on-surface-variant bg-surface-container rounded-full hover:bg-surface-container-high transition-colors">
              <i data-lucide="copy" class="w-3 h-3"></i>
              复制
            </button>
            <button class="flex items-center gap-1 px-3 py-1.5 text-xs text-on-surface-variant bg-surface-container rounded-full hover:bg-surface-container-high transition-colors">
              <i data-lucide="star" class="w-3 h-3"></i>
              收藏
            </button>
          </div>
          <p class="text-xs text-on-surface-variant mt-1">14:31</p>
        </div>
      </div>

      <!-- 用户追问 -->
      <div class="flex gap-3 justify-end">
        <div class="max-w-[80%]">
          <div class="bg-primary text-on-primary px-4 py-3 rounded-2xl rounded-tr-sm">
            <p class="text-sm">能把这个计划分享给团队成员吗？</p>
          </div>
          <p class="text-xs text-on-surface-variant mt-1 text-right">14:35</p>
        </div>
      </div>

      <!-- AI 回复 -->
      <div class="flex gap-3 justify-start">
        <div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center flex-shrink-0 mt-2">
          <i data-lucide="bot" class="w-4 h-4 text-primary"></i>
        </div>
        <div class="max-w-[80%]">
          <div class="bg-surface px-4 py-3 rounded-2xl rounded-tl-sm shadow-card">
            <p class="text-sm text-on-surface">当然可以！您可以选择以下方式分享：</p>
            <div class="flex flex-wrap gap-2 mt-3">
              <button class="flex items-center gap-1 px-3 py-2 text-xs bg-primary-container text-primary rounded-lg">
                <i data-lucide="mail" class="w-3 h-3"></i>
                邮件
              </button>
              <button class="flex items-center gap-1 px-3 py-2 text-xs bg-primary-container text-primary rounded-lg">
                <i data-lucide="message-square" class="w-3 h-3"></i>
                微信
              </button>
              <button class="flex items-center gap-1 px-3 py-2 text-xs bg-primary-container text-primary rounded-lg">
                <i data-lucide="link" class="w-3 h-3"></i>
                复制链接
              </button>
            </div>
          </div>
          <p class="text-xs text-on-surface-variant mt-1">14:35</p>
        </div>
      </div>

    </div>

    <!-- @main-content:end -->
  </main>

  <!-- 底部输入框 -->
  <div class="fixed bottom-0 left-0 right-0 z-40 bg-surface border-t border-outline-variant/20 pb-[env(safe-area-inset-bottom)]">
    <div class="px-4 py-3 flex items-end gap-3">
      <div class="flex-1 flex items-end gap-2 bg-surface-container rounded-2xl px-4 py-3">
        <textarea class="flex-1 bg-transparent text-sm text-on-surface resize-none outline-none placeholder:text-on-surface-variant" rows="1" placeholder="输入消息..."></textarea>
        <button class="w-8 h-8 flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
          <i data-lucide="image" class="w-5 h-5"></i>
        </button>
      </div>
      <button class="w-11 h-11 flex items-center justify-center bg-primary text-on-primary rounded-full hover:bg-primary/90 transition-colors">
        <i data-lucide="send" class="w-5 h-5"></i>
      </button>
    </div>
  </div>

  <script>lucide.createIcons();</script>
  <script>
    // 简单的 textarea 自动高度
    document.querySelector('textarea').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
  </script>
</body>

</html>
